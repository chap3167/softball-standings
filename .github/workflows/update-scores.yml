name: Update scores

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: update-scores
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python3 scripts/update_scores.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No score changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Scores changed."
          fi

      - name: Commit updated index.html
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "field-report-bot"
          git config user.email "field-report-bot@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update scores ($(date -u +'%Y-%m-%d %H:%MZ'))"
          git push

      - name: Deploy to Netlify
        if: steps.diff.outputs.changed == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx -y netlify-cli@latest deploy --prod --dir . \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --message "auto-update $(date -u +'%Y-%m-%d %H:%MZ')"
